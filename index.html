<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wacpt4 的作品集导航</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #a855f7;
            --accent-gradient: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        header::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--accent-gradient);
            margin: 20px auto 0;
            border-radius: 2px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
        }

        /* 搜索框设计 */
        .search-box {
            position: relative;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        /* 网格卡片布局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            background: var(--card-hover);
            border-color: rgba(168, 85, 247, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.05);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            word-break: break-all;
        }

        .card-path {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 状态提示 */
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            .container { padding: 24px 16px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="repo-title">wacpt4 的空间</h1>
        <p class="subtitle">🚀 正在实时同步 GitHub 仓库中的所有网页...</p>
    </header>

    <!-- 搜索过滤 -->
    <div class="search-box">
        <input type="text" id="search-input" placeholder="输入关键字搜索网页...">
    </div>

    <main>
        <div id="grid-container" class="grid-container">
            <div class="status-msg" id="status-node">
                <div class="spinner"></div>
                探索仓库中，请稍候...
            </div>
        </div>
    </main>
</div>

<script>
    // 已经完美匹配你的网址：wacpt4.github.io/1/
    const CONFIG = {
        username: 'wacpt4',
        repo: '1'
    };

    let allHtmlFiles = []; // 存放所有获取到的文件

    const gridContainer = document.getElementById('grid-container');
    const statusNode = document.getElementById('status-node');
    const searchInput = document.getElementById('search-input');

    // 随机分配小卡片图标，让界面更好看
    const icons = ['🎮', '🎨', '🚀', '🔮', '📂', '⚡', '🤖', '🎯', '🎵', '🧩'];
    function getRandomIcon(name) {
        // 根据文件名哈希一个固定的图标，防止每次刷新都随机变动
        let sum = 0;
        for (let i = 0; i < name.length; i++) sum += name.charCodeAt(i);
        return icons[sum % icons.length];
    }

    async function loadAllPages() {
        // 使用 GitHub Trees recursive API，可以穿透读取任意子文件夹下的所有文件！
        const apiUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/git/trees/main?recursive=1`;
        const pagesBaseUrl = `https://${CONFIG.username}.github.io/${CONFIG.repo}/`;

        try {
            const response = await fetch(apiUrl);
            
            // 如果你的默认分支不是 main 而是 master，这里做个自动兼容
            if (response.status === 404) {
                const altResponse = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/git/trees/master?recursive=1`);
                if (!altResponse.ok) throw new Error('未能找到你的分支，请检查仓库设置。');
                return handleData(await altResponse.json(), pagesBaseUrl);
            }
            
            if (!response.ok) throw new Error('无法连接到 GitHub 服务，请稍后再试。');
            handleData(await response.json(), pagesBaseUrl);

        } catch (error) {
            statusNode.innerHTML = `❌ 加载失败: ${error.message}`;
        }
    }

    function handleData(data, baseUrl) {
        // 过滤规则：必须是文件、后缀必须是 .html、且不能是首页 index.html
        allHtmlFiles = data.tree.filter(item => 
            item.type === 'blob' && 
            item.path.endsWith('.html') && 
            item.path.toLowerCase() !== 'index.html'
        );

        if (allHtmlFiles.length === 0) {
            statusNode.innerHTML = '📂 仓库中除首页外，暂未发现其他 HTML 网页。';
            return;
        }

        // 隐藏加载状态并渲染
        statusNode.style.display = 'none';
        renderCards(allHtmlFiles, baseUrl);

        // 绑定搜索事件
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allHtmlFiles.filter(file => file.path.toLowerCase().includes(keyword));
            renderCards(filtered, baseUrl);
        });
    }

    function renderCards(files, baseUrl) {
        // 先清空除状态以外的所有卡片
        const cards = gridContainer.querySelectorAll('.card');
        cards.forEach(c => c.remove());

        if (files.length === 0) {
            const noResult = document.createElement('div');
            noResult.className = 'status-msg card-empty-hint';
            noResult.textContent = '🔍 没有找到匹配的网页';
            gridContainer.appendChild(noResult);
            return;
        }

        const noResultHint = gridContainer.querySelector('.card-empty-hint');
        if (noResultHint) noResultHint.remove();

        files.forEach(file => {
            // 提取文件名
            const pathParts = file.path.split('/');
            const fileName = pathParts[pathParts.length - 1];
            // 提取文件夹路径（如果有的话）
            const folderPath = pathParts.length > 1 ? pathParts.slice(0, -1).join('/') + '/' : '';

            const card = document.createElement('div');
            card.className = 'card';

            const fullUrl = `${baseUrl}${file.path}`;
            const icon = getRandomIcon(fileName);

            card.innerHTML = `
                <a href="${fullUrl}" class="card-link" target="_blank">
                    <div class="card-icon">${icon}</div>
                    <div class="card-title">${fileName}</div>
                    <div class="card-path">
                        <span>📍</span> ${folderPath || '根目录'}
                    </div>
                </a>
            `;
            gridContainer.appendChild(card);
        });
    }

    loadAllPages();
</script>

</body>
</html>
