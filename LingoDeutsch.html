<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德语学习助手</title>
<style>
/* ==========================================
   🎨 CSS 变量：定义浅色和深色主题
   ========================================== */
:root {
    --bg-gradient: linear-gradient(135deg, #f3f0ff, #e5dbff);
    --text-main: #3b286d;
    --text-sub: #705da4;
    --text-card-big: #4338ca;
    --text-card-small: #6b7280;
    --btn-bg: rgba(255, 255, 255, 0.6);
    --btn-color: #5f4bb6;
    --btn-active-bg: #5f4bb6;
    --btn-active-color: white;
    --card-bg: rgba(255, 255, 255, 0.7);
    --card-hover-bg: rgba(255, 255, 255, 0.95);
    --card-shadow: 0 4px 14px rgba(147, 130, 219, 0.15);
    --card-hover-shadow: 0 6px 20px rgba(147, 130, 219, 0.25);
    --card-border: rgba(255, 255, 255, 0.6);
    --card-playing-bg: #e0e7ff;
    --card-playing-border: #6366f1;
    --star-color: #d1d5db;
    --star-active-color: #fbbf24;

    /* 💬 聊天对话专属颜色 */
    --chat-left-bg: rgba(255, 255, 255, 0.95);
    --chat-right-bg: #e8e5ff;
    --chat-avatar-bg: #5f4bb6;

    /* 🎮 练习模式与拼词模式通用颜色 */
    --match-selected: #cbd5e1;
    --match-success-bg: #e2fbe8;
    --match-success-border: #22c55e;
    --match-success-text: #15803d;
    --match-error-bg: #fef2f2;
    --match-error-border: #ef4444;
    --match-error-text: #b91c1c;

    /* 🧩 拼词/提示框专属适配 */
    --builder-prompt-bg: rgba(255, 255, 255, 0.6);
    --builder-zone-bg: rgba(255, 255, 255, 0.3);
    --hint-bg: rgba(34, 197, 94, 0.15);
    --hint-border: #22c55e;
    --hint-text: #15803d;
}

[data-theme="dark"] {
    --bg-gradient: linear-gradient(135deg, #1e1b4b, #311042);
    --text-main: #f3f4f6;
    --text-sub: rgba(255, 255, 255, 0.6);
    --text-card-big: #a5b4fc;
    --text-card-small: #cbd5e1;
    --btn-bg: rgba(255, 255, 255, 0.1);
    --btn-color: #c7d2fe;
    --btn-active-bg: #6366f1;
    --btn-active-color: white;
    --card-bg: rgba(255, 255, 255, 0.08);
    --card-hover-bg: rgba(255, 255, 255, 0.15);
    --card-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
    --card-hover-shadow: 0 6px 20px rgba(99, 102, 241, 0.2);
    --card-border: rgba(255, 255, 255, 0.1);
    --card-playing-bg: rgba(99, 102, 241, 0.35);
    --card-playing-border: #818cf8;
    --star-color: rgba(255, 255, 255, 0.2);
    --star-active-color: #fbbf24;

    /* 💬 聊天对话专属颜色 */
    --chat-left-bg: rgba(255, 255, 255, 0.08);
    --chat-right-bg: rgba(95, 75, 182, 0.3);
    --chat-avatar-bg: #818cf8;

    /* 🎮 连连看练习模式专属颜色 */
    --match-selected: rgba(99, 102, 241, 0.4);
    --match-success-bg: rgba(34, 197, 94, 0.2);
    --match-success-border: #22c55e;
    --match-success-text: #86efac;
    --match-error-bg: rgba(239, 68, 68, 0.2);
    --match-error-border: #f87171;
    --match-error-text: #fca5a5;

    /* 🧩 拼词/提示框深色模式优化（解决“吃字”与颜色对冲） */
    --builder-prompt-bg: rgba(255, 255, 255, 0.08);
    --builder-zone-bg: rgba(0, 0, 0, 0.25);
    --hint-bg: rgba(34, 197, 94, 0.2);
    --hint-border: #4ade80;
    --hint-text: #86efac;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg-gradient);
    color: var(--text-main);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
}
.header { text-align: center; padding: 25px; position: relative; }
.header p { color: var(--text-sub); margin-top: 5px; }

.theme-toggle {
    position: absolute; right: 20px; top: 20px; padding: 10px 16px; font-size: 14px;
    background: var(--btn-bg); color: var(--btn-color); border-radius: 20px; box-shadow: var(--card-shadow);
}

.tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; padding: 0 10px; }
button {
    border: none; padding: 12px 22px; border-radius: 12px; cursor: pointer; font-size: 15px;
    background: var(--btn-bg); color: var(--btn-color); transition: 0.2s; box-shadow: var(--card-shadow);
    -webkit-tap-highlight-color: transparent;
}
button:hover { background: var(--card-hover-bg); }
.tabs button.active { background: var(--btn-active-bg); color: var(--btn-active-color); font-weight: bold; }

.page { display: none; max-width: 1200px; margin: auto; padding: 20px; box-sizing: border-box; }
.page.show { display: block !important; }

/* ==========================================
   🖼️ 自适应卡片图片样式（限制尺寸）
   ========================================== */
.card-img {
    max-width: 100%;
    max-height: 130px;
    object-fit: contain;
    border-radius: 10px;
    margin-bottom: 10px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    pointer-events: none;
}

/* ==========================================
   🧱 基础网格布局样式 
   ========================================== */
.grid-word { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
.grid-word .big { font-size: 1.4rem; font-weight: bold; color: var(--text-card-big); }
.grid-word .small { font-size: 1rem; margin-top: 8px; color: var(--text-card-small); }

.grid-phrase { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
.grid-phrase .big { font-size: 1.25rem; font-weight: bold; color: var(--text-card-big); }
.grid-phrase .small { font-size: 1.05rem; margin-top: 6px; color: var(--text-card-small); }

.grid-sentence { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; }
.grid-sentence .card { text-align: left; padding: 20px; }
.grid-sentence .big { font-size: 1.2rem; font-weight: bold; line-height: 1.4; color: var(--text-card-big); }
.grid-sentence .small { font-size: 1.05rem; margin-top: 8px; color: var(--text-card-small); line-height: 1.4; }

.grid-long-sentence { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; }
@media (max-width: 600px) { .grid-long-sentence { grid-template-columns: 1fr; } }
.grid-long-sentence .card { text-align: left; padding: 24px; display: flex; flex-direction: column; gap: 10px; }
.grid-long-sentence .big { font-size: 1.15rem; font-weight: bold; line-height: 1.5; color: var(--text-card-big); border-bottom: 1px dashed var(--card-border); padding-bottom: 8px; padding-right: 25px; }
.grid-long-sentence .small { font-size: 1.05rem; line-height: 1.6; color: var(--text-card-small); margin: 0; }
.grid-long-sentence .card-img { max-height: 180px; align-self: center; }

/* ==========================================
   🚨 对话布局 (Dialogue) 
   ========================================== */
.grid-dialogue {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;             
    padding: 10px;
    box-sizing: border-box;
}
.dialogue-row {
    display: flex;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 5px;
}
.dialogue-row.left { justify-content: flex-start; }
.dialogue-row.right { justify-content: flex-end; }

.dialogue-content {
    display: flex;
    gap: 14px;
    max-width: 75%; 
    align-items: flex-start;
}
.dialogue-row.left .dialogue-content { flex-direction: row; }
.dialogue-row.right .dialogue-content { flex-direction: row-reverse; }

.chat-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--chat-avatar-bg); color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 1.1rem; box-shadow: var(--card-shadow);
    flex-shrink: 0;          
}

.dialogue-content .card {
    display: block;
    width: auto;                  
    text-align: left;
    padding: 16px 22px;
    border-radius: 20px;
    box-sizing: border-box;
}
.dialogue-row.left .card { background: var(--chat-left-bg); border-top-left-radius: 4px; }
.dialogue-row.right .card { background: var(--chat-right-bg); border-top-right-radius: 4px; }

.dialogue-content .card .big { font-size: 1.15rem; font-weight: bold; color: var(--text-main); line-height: 1.5; padding-right: 25px; text-align: left; }
.dialogue-content .card .small { font-size: 1rem; margin-top: 6px; color: var(--text-card-small); line-height: 1.45; text-align: left; }

/* ==========================================
   公共卡片与辅助样式
   ========================================== */
.card {
    position: relative;
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    padding: 24px 18px 18px 18px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s, box-shadow 0.2s, border-color 0.2s;
    box-shadow: var(--card-shadow);
    border: 1px solid var(--card-border);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
.card:hover {
    transform: translateY(-3px);
    background: var(--card-hover-bg);
    box-shadow: var(--card-hover-shadow);
}

.star-icon {
    position: absolute; top: 14px; right: 16px; font-size: 1.1rem;
    color: var(--star-color); cursor: pointer; transition: transform 0.1s, color 0.2s;
    user-select: none; z-index: 10;
}
.star-icon:hover { transform: scale(1.2); }
.star-icon.active { color: var(--star-active-color); filter: drop-shadow(0 0 2px rgba(251, 191, 36, 0.4)); }

.card.playing {
    background: var(--card-playing-bg) !important;
    border-color: var(--card-playing-border) !important;
    transform: scale(1.02) translateY(-1px);
    box-shadow: var(--hover-shadow);
}

/* ==========================================
   🚀 左上角悬浮播放面板
   ========================================== */
.play-panel { 
    position: fixed; 
    left: 20px; 
    top: 20px; 
    z-index: 9999; 
    display: flex;
    gap: 8px;
}
.autoplay-btn, .practice-mode-btn, .builder-mode-btn, .image-mode-btn { 
    font-size: 14px; 
    padding: 10px 18px; 
    border-radius: 20px; 
    background: #6366f1; 
    color: white; 
    font-weight: bold; 
    letter-spacing: 0.5px; 
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    transition: opacity 0.2s, transform 0.2s, background 0.2s;
}
.autoplay-btn:hover, .practice-mode-btn:hover, .builder-mode-btn:hover, .image-mode-btn:hover { 
    background: #4f46e5;
    transform: scale(1.05);
}
.autoplay-btn.playing, .practice-mode-btn.active, .builder-mode-btn.active, .image-mode-btn.active { 
    background: #ef4444; 
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); 
}
.empty-tip { text-align: center; padding: 40px; color: var(--text-sub); font-style: italic; font-size: 1.1rem; }

/* ==========================================
   🎮 练习模式 UI 布局 (连连看 & 拼词 & 听音选图)
   ========================================== */
.practice-container {
    max-width: 800px;
    margin: 20px auto;
    padding: 24px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(10px);
}
.practice-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 5px;
}
.practice-header h3 { margin: 0; color: var(--text-main); font-size: 1.2rem; }

/* 🏹 翻页控制控件 */
.page-controls {
    display: flex;
    align-items: center;
    gap: 8px;
}
.nav-arrow {
    padding: 5px 12px;
    font-size: 14px;
    border-radius: 8px;
    background: var(--btn-bg);
    color: var(--btn-color);
    border: 1px solid var(--card-border);
    cursor: pointer;
    box-shadow: var(--card-shadow);
    transition: transform 0.15s, background 0.2s;
}
.nav-arrow:hover:not(:disabled) {
    transform: scale(1.1);
    background: var(--card-hover-bg);
}
.nav-arrow:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
}

.practice-board {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
.practice-column {
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.practice-card {
    padding: 18px 14px;
    font-size: 1.05rem;
    font-weight: 500;
    border-radius: 16px;
    text-align: center;
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    color: var(--text-main);
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s, opacity 0.3s, transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
.practice-card:hover {
    transform: translateY(-2px);
    background: var(--card-hover-bg);
    box-shadow: var(--card-hover-shadow);
}

/* 选中状态 */
.practice-card.selected {
    background: var(--match-selected) !important;
    border-color: var(--btn-active-bg) !important;
    transform: scale(0.97) translateY(0);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
}
/* 🎉 配对成功状态 */
.practice-card.success {
    animation: successPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    background: var(--match-success-bg) !important;
    border-color: var(--match-success-border) !important;
    color: var(--match-success-text) !important;
    cursor: default;
    pointer-events: none;
}
/* ❌ 配对失败状态 */
.practice-card.error {
    animation: errorShake 0.4s ease-in-out;
    background: var(--match-error-bg) !important;
    border-color: var(--match-error-border) !important;
    color: var(--match-error-text) !important;
}

/* ==========================================
   🧩 多邻国风格：拼词/拼单词 UI 样式（适配主题）
   ========================================== */
.builder-target-prompt {
    font-size: 1.25rem;
    font-weight: bold;
    color: var(--text-card-big);
    margin-bottom: 20px;
    text-align: center;
    line-height: 1.4;
    padding: 14px;
    background: var(--builder-prompt-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.speaker-btn {
    background: var(--btn-bg);
    color: var(--btn-color);
    border: 1px solid var(--card-border);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0;
    box-shadow: var(--card-shadow);
    transition: transform 0.15s;
}
.speaker-btn:hover {
    transform: scale(1.1);
    background: var(--card-hover-bg);
}

.builder-answer-zone {
    min-height: 65px;
    background: var(--builder-zone-bg);
    border: 2px solid var(--card-border);
    border-radius: 16px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
    padding: 12px;
    transition: border-color 0.3s, background 0.3s;
}

.builder-answer-zone.error {
    border-color: var(--match-error-border) !important;
    background: var(--match-error-bg) !important;
    animation: errorShake 0.4s ease-in-out;
}

.builder-answer-zone.success {
    border-color: var(--match-success-border) !important;
    background: var(--match-success-bg) !important;
}

.correct-answer-hint {
    margin-bottom: 15px;
    padding: 12px 18px;
    background: var(--hint-bg);
    border: 1px solid var(--hint-border);
    border-radius: 12px;
    color: var(--hint-text);
    font-weight: bold;
    font-size: 1.05rem;
    text-align: center;
    display: none;
    box-shadow: var(--card-shadow);
}
.correct-answer-hint.show {
    display: block;
    animation: fadeIn 0.3s ease-in-out;
}

.builder-pool-zone {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    min-height: 80px;
    margin-bottom: 20px;
}

.tile-btn {
    padding: 10px 18px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 14px;
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    box-shadow: var(--card-shadow);
    color: var(--text-main);
    cursor: pointer;
    transition: transform 0.15s, background 0.2s, border-color 0.2s;
    user-select: none;
}

.tile-btn:hover {
    transform: translateY(-2px);
    background: var(--card-hover-bg);
}

.tile-btn.disabled {
    opacity: 0.2;
    pointer-events: none;
    transform: none;
    box-shadow: none;
}

.builder-actions {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.btn-check {
    background: #22c55e;
    color: white;
    font-weight: bold;
    padding: 12px 30px;
    border-radius: 16px;
    font-size: 1.05rem;
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
}
.btn-check:hover { background: #16a34a; }

.btn-clear {
    background: var(--btn-bg);
    color: var(--text-main);
    padding: 12px 20px;
    border-radius: 16px;
    border: 1px solid var(--card-border);
}

/* ==========================================
   🖼️ 听音选图模式专属样式
   ========================================== */
.image-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-top: 20px;
}

.image-choice-card {
    background: var(--card-bg);
    border: 3px solid var(--card-border);
    border-radius: 18px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    min-height: 140px;
}

.image-choice-card:hover {
    transform: translateY(-3px);
    background: var(--card-hover-bg);
}

.image-choice-card img {
    max-width: 100%;
    max-height: 120px;
    object-fit: contain;
    pointer-events: none;
}

.image-choice-card.success {
    animation: successPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    background: var(--match-success-bg) !important;
    border-color: var(--match-success-border) !important;
}

.image-choice-card.error {
    animation: errorShake 0.4s ease-in-out;
    background: var(--match-error-bg) !important;
    border-color: var(--match-error-border) !important;
}

@keyframes successPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); opacity: 0.5; }
}

@keyframes errorShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
    .play-panel { left: 10px; top: 15px; }
    .header { padding-top: 65px; }
    .practice-board { gap: 12px; }
    .practice-card { padding: 14px 8px; font-size: 0.95rem; min-height: 32px; }
    .tile-btn { padding: 8px 12px; font-size: 0.95rem; }
    .image-choice-card { min-height: 110px; padding: 10px; }
    .image-choice-card img { max-height: 90px; }
}
</style>
</head>
<body>

<div class="play-panel">
    <button id="autoPlayBtn" class="autoplay-btn" onclick="toggleAutoPlay()">▶</button>
    <button id="practiceBtn" class="practice-mode-btn" onclick="togglePracticeMode()">🎮 连连看</button>
    <button id="builderBtn" class="builder-mode-btn" onclick="toggleBuilderMode()">🧩 拼词</button>
    <button id="imageBtn" class="image-mode-btn" onclick="toggleImageMode()">🖼️ 选图</button>
</div>

<div class="header">
    <h1>🇩🇪 德语学习助手</h1>
    <p>A1</p>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</div>
    
<div class="tabs" id="tabsContainer"></div>
<div id="pagesContainer"></div>

<script>
// ==========================================
// 💡 数据源
// ==========================================
const appData = {

    // ------------------------------------------
    // 🔤 Basics & Numbers
    // ------------------------------------------
    alphabet: {
        title: "🔤 ABC",
        layout: "word",
        speakType: "key", 
        items: [
            ["A","a"],["B","be"],["C","ce"],["D","de"],["E","e"],["F","ef"],
            ["G","ge"],["H","ha"],["I","i"],["J","jot"],["K","ka"],["L","el"],
            ["M","em"],["N","en"],["O","o"],["P","pe"],["Q","ku"],["R","er"],
            ["S","es"],["T","te"],["U","u"],["V","fau"],["W","we"],
            ["X","iks"],["Y","ypsilon"],["Z","tsett"],
            ["Ä","ä"],["Ö","ö"],["Ü","ü"],["ß","Eszett"]
        ]
    },

    numbers_base: {
        title: "🔢 0-12",
        layout: "word",

function toggleTheme() {
    const currentTheme = document.body.getAttribute('data-theme');
    if (currentTheme === 'dark') document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme', 'dark');
}

function speak(text, callback) {
    let cleanedText = text;
    if (text.length === 1 && text === text.toUpperCase()) { cleanedText = text.toLowerCase(); }
    if (cleanedText === 'ä' || cleanedText === 'Ä') cleanedText = 'eh';
    if (cleanedText === 'ö' || cleanedText === 'Ö') cleanedText = 'öh';
    if (cleanedText === 'ü' || cleanedText === 'Ü') cleanedText = 'üh';
    if (cleanedText === 'ß' || cleanedText === 'ẞ') cleanedText = 'esszett';
    
    const u = new SpeechSynthesisUtterance(cleanedText);
    u.lang = "de-DE";
    if (callback) {
        u.onend = () => callback();
        u.onerror = () => callback();
    }
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

function toggleStar(e, pageKey, itemIndex, starEl) {
    e.stopPropagation(); 
    const item = appData[pageKey].items[itemIndex];
    const uniqueId = `${pageKey}-${itemIndex}`;
    const existingIndex = starredItems.findIndex(x => x.id === uniqueId);
    
    if (existingIndex > -1) {
        starredItems.splice(existingIndex, 1);
        document.querySelectorAll(`.star-${uniqueId}`).forEach(el => el.classList.remove('active'));
    } else {
        starredItems.push({
            id: uniqueId,
            pageKey: pageKey,
            layout: appData[pageKey].layout,
            speakType: appData[pageKey].speakType,
            data: item
        });
        document.querySelectorAll(`.star-${uniqueId}`).forEach(el => el.classList.add('active'));
    }
    
    localStorage.setItem('german_helper_stars', JSON.stringify(starredItems));
    renderReviewPage();
}

function renderReviewPage() {
    const reviewGrid = document.getElementById('review-grid');
    if (!reviewGrid) return;
    reviewGrid.removeAttribute('class'); 
    reviewGrid.innerHTML = '';
    
    if (starredItems.length === 0) {
        reviewGrid.innerHTML = `<div class="empty-tip">⭐ 还没有标记重点。点击其他页面卡片上的星星，不熟的内容会同步到这里，刷新也不会丢失哦！</div>`;
        return;
    }
    
    reviewGrid.className = 'grid-sentence'; 
    starredItems.forEach((fav) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'grid-sentence'; 
        
        const isDialogue = fav.layout === 'dialogue';
        const imgUrl = isDialogue ? fav.data[3] : fav.data[2];
        const imgHtml = imgUrl ? `<img src="${imgUrl}" class="card-img" alt="illustration">` : '';

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <span class="star-icon active star-${fav.id}" onclick="toggleStar(event, '${fav.pageKey}', ${fav.id.split('-')[1]}, this)">★</span>
            ${imgHtml}
            <div class='big'>${fav.data[0]}</div>
            <div class='small'>${fav.data[1]}</div>
        `;
        
        const textToSpeak = fav.speakType === 'key' ? fav.data[0] : fav.data[1];
        card.onclick = () => {
            stopAutoplay();
            speak(textToSpeak);
        };
        wrapper.appendChild(card);
        reviewGrid.appendChild(wrapper);
    });
}

function syncStarUIFromStorage() {
    starredItems.forEach(fav => {
        document.querySelectorAll(`.star-${fav.id}`).forEach(el => el.classList.add('active'));
    });
}

function startAutoplay() {
    const activePage = document.getElementById(`page-${currentActivePageId}`);
    const cards = activePage.querySelectorAll('.card');
    
    if (currentPlayIndex >= cards.length || cards.length === 0) {
        stopAutoplay();
        return;
    }

    cards.forEach(c => c.classList.remove('playing'));
    const currentCard = cards[currentPlayIndex];
    
    if (currentCard.parentElement.classList.contains('empty-tip') || currentCard.classList.contains('empty-tip')) {
        stopAutoplay();
        return;
    }
    
    currentCard.classList.add('playing');
    currentCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    let textToSpeak = "";
    if (currentActivePageId === 'review') {
        const fav = starredItems[currentPlayIndex];
        textToSpeak = fav.speakType === 'key' ? fav.data[0] : fav.data[1];
    } else {
        const pageConfig = appData[currentActivePageId];
        const itemData = pageConfig.items[currentPlayIndex];
        textToSpeak = pageConfig.speakType === 'key' ? itemData[0] : itemData[1];
    }

    speak(textToSpeak, () => {
        if (!isAutoplayRunning) return;
        currentPlayIndex++;
        setTimeout(() => { if (isAutoplayRunning) startAutoplay(); }, 1400); 
    });
}

function stopAutoplay() {
    isAutoplayRunning = false;
    speechSynthesis.cancel();
    document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
    const btn = document.getElementById('autoPlayBtn');
    btn.innerHTML = "▶";
    btn.classList.remove('playing');
}

function toggleAutoPlay() {
    if (isPracticeModeActive) quitPracticeMode();
    if (isBuilderModeActive) quitBuilderMode();
    if (isImageModeActive) quitImageMode();

    if (isAutoplayRunning) {
        stopAutoplay();
    } else {
        isAutoplayRunning = true;
        currentPlayIndex = 0;
        const btn = document.getElementById('autoPlayBtn');
        btn.innerHTML = "⏸";
        btn.classList.add('playing');
        startAutoplay();
    }
}

function initPracticeGame() {
    clearPracticeView();

    let sourceItems = [];
    if (currentActivePageId === 'review') {
        sourceItems = starredItems.map(x => x.data);
    } else {
        sourceItems = appData[currentActivePageId].items;
    }

    if (sourceItems.length === 0) {
        alert("当前页面没有可以练习的词汇哦！");
        quitPracticeMode();

    }

    practiceItemsAll = sourceItems.map((item, idx) => {

    });

    document.querySelectorAll('.page').forEach(p => {
        p.style.setProperty('display', 'none', 'important');

function navigatePracticeGroup(step) {
    if (isAnimating) return;
    const totalGroups = Math.ceil(practiceItemsAll.length / 8);
    const newIndex = practiceGroupIndex + step;
    if (newIndex >= 0 && newIndex < totalGroups) {
        practiceGroupIndex = newIndex;
        renderPracticeGroup();
    }
}

function renderPracticeGroup() {
    const startIdx = practiceGroupIndex * 8;
    const currentGroup = practiceItemsAll.slice(startIdx, startIdx + 8);
    const totalGroups = Math.ceil(practiceItemsAll.length / 8);

    if (currentGroup.length === 0) {
        alert("🎉 太棒了！本页的所有内容全部练习完毕！");
        quitPracticeMode();
        return;
    }

    clearPracticeView();

    const practiceBox = document.createElement('div');
    practiceBox.id = 'practice-box';
    practiceBox.className = 'practice-container';

    practiceBox.innerHTML = `
        <div class="practice-header">
            <h3>🎮 连连看模式 (${practiceGroupIndex + 1}/${totalGroups} 组)</h3>
            <div class="page-controls">
                <button class="nav-arrow" ${practiceGroupIndex === 0 ? 'disabled' : ''} onclick="navigatePracticeGroup(-1)">◀</button>
                <button class="nav-arrow" ${practiceGroupIndex >= totalGroups - 1 ? 'disabled' : ''} onclick="navigatePracticeGroup(1)">▶</button>
            </div>
        </div>
        <div class="practice-board">
            <div class="practice-column" id="german-col"></div>
            <div class="practice-column" id="translation-col"></div>
        </div>
    `;

    const pagesContainer = document.getElementById('pagesContainer');
    pagesContainer.appendChild(practiceBox);

    const germanCol = document.getElementById('german-col');
    const translationCol = document.getElementById('translation-col');

    const shuffledGerman = [...currentGroup].sort(() => Math.random() - 0.5);
    const shuffledTranslation = [...currentGroup].sort(() => Math.random() - 0.5);

    selectedGermanCard = null;
    selectedTranslationCard = null;
    isAnimating = false;

    shuffledGerman.forEach(item => {
        const card = document.createElement('div');
        card.className = 'practice-card';
        card.innerText = item.german;
        card.dataset.id = item.id;
        card.onclick = () => { if(!isAnimating) selectGermanCard(card, item.german); };
        germanCol.appendChild(card);
    });

    shuffledTranslation.forEach(item => {
        const card = document.createElement('div');
        card.className = 'practice-card';
        card.innerText = item.translation;
        card.dataset.id = item.id;
        card.onclick = () => { if(!isAnimating) selectTranslationCard(card); };
        translationCol.appendChild(card);
    });
}

function selectGermanCard(cardElement, text) {
    if (cardElement.classList.contains('success')) return;
    speak(text);

    if (selectedGermanCard) { selectedGermanCard.classList.remove('selected'); }
    selectedGermanCard = cardElement;
    selectedGermanCard.classList.add('selected');
    checkMatch();
}

function selectTranslationCard(cardElement) {
    if (cardElement.classList.contains('success')) return;

    if (selectedTranslationCard) { selectedTranslationCard.classList.remove('selected'); }
    selectedTranslationCard = cardElement;
    selectedTranslationCard.classList.add('selected');
    checkMatch();
}

function checkMatch() {
    if (!selectedGermanCard || !selectedTranslationCard) return;

    const germanId = selectedGermanCard.dataset.id;
    const translationId = selectedTranslationCard.dataset.id;

    if (germanId === translationId) {
        const c1 = selectedGermanCard;
        const c2 = selectedTranslationCard;
        
        c1.classList.remove('selected');
        c2.classList.remove('selected');
        c1.classList.add('success');
        c2.classList.add('success');

        selectedGermanCard = null;
        selectedTranslationCard = null;

        const remaining = document.querySelectorAll('.practice-card:not(.success)');
        if (remaining.length === 0) {
            isAnimating = true;
            setTimeout(() => {
                practiceGroupIndex++;
                renderPracticeGroup();
            }, 700);
        }
    } else {
        isAnimating = true;
        const c1 = selectedGermanCard;
        const c2 = selectedTranslationCard;
        
        c1.classList.remove('selected');
        c2.classList.remove('selected');
        c1.classList.add('error');
        c2.classList.add('error');

        selectedGermanCard = null;
        selectedTranslationCard = null;

        setTimeout(() => {
            c1.classList.remove('error');
            c2.classList.remove('error');
            isAnimating = false;
        }, 400);
    }
}

function navigateBuilderQuestion(step) {
    if (isAnimating) return;
    const newIndex = builderIndex + step;
    if (newIndex >= 0 && newIndex < builderItemsAll.length) {
        builderIndex = newIndex;
        renderBuilderQuestion();
    }
}

function renderBuilderQuestion() {
    clearBuilderView();
    builderErrorCount = 0;

    if (builderIndex >= builderItemsAll.length) {
        alert("🎉 太棒了！您已完成本组所有拼词/拼单词练习！");
        quitBuilderMode();
        return;
    }

    const currentItem = builderItemsAll[builderIndex];
    const germanText = currentItem.german;
    const translationText = currentItem.translation;
    const layout = currentItem.layout;

    const isSentenceMode = (layout === 'sentence' || layout === 'long-sentence' || layout === 'dialogue');

    if (isSentenceMode) {
        builderExpectedTokens = germanText.trim().split(/\s+/);
    } else {
        builderExpectedTokens = germanText.trim().split('');
    }

    builderTokensPool = builderExpectedTokens.map((token, idx) => ({ id: idx, token: token }));
    builderTokensPool.sort(() => Math.random() - 0.5);
    builderSelectedTokens = [];

    const builderBox = document.createElement('div');
    builderBox.id = 'builder-box';
    builderBox.className = 'practice-container';

    const modeTitle = isSentenceMode ? "🧩 拼词成句" : "🧩 单词拼写";

    builderBox.innerHTML = `
        <div class="practice-header">
            <h3>${modeTitle} (${builderIndex + 1}/${builderItemsAll.length})</h3>
            <div class="page-controls">
                <button class="nav-arrow" ${builderIndex === 0 ? 'disabled' : ''} onclick="navigateBuilderQuestion(-1)">◀</button>
                <button class="nav-arrow" ${builderIndex >= builderItemsAll.length - 1 ? 'disabled' : ''} onclick="navigateBuilderQuestion(1)">▶</button>
            </div>
        </div>
        <div class="builder-target-prompt">
            <span>${translationText}</span>
            <button class="speaker-btn" title="听读音" onclick="speakCurrentTarget()">🔊</button>
        </div>
        <div class="builder-answer-zone" id="builder-answer-zone"></div>
        <div class="correct-answer-hint" id="correct-hint">💡 正确答案：${germanText}</div>
        <div class="builder-pool-zone" id="builder-pool-zone"></div>
        <div class="builder-actions">
            <button class="btn-clear" onclick="clearBuilderSelection()">🔄 重置</button>
            <button class="btn-check" onclick="checkBuilderAnswer()">✅ 检查答案</button>
        </div>
    `;

    const pagesContainer = document.getElementById('pagesContainer');
    pagesContainer.appendChild(builderBox);

    renderBuilderTiles();
}

function speakCurrentTarget() {
    if (builderItemsAll[builderIndex]) {
        speak(builderItemsAll[builderIndex].german);
    }
}

function renderBuilderTiles() {
    const answerZone = document.getElementById('builder-answer-zone');
    const poolZone = document.getElementById('builder-pool-zone');

    if (!answerZone || !poolZone) return;

    answerZone.innerHTML = '';
    poolZone.innerHTML = '';

    const currentItem = builderItemsAll[builderIndex];
    const layout = currentItem ? currentItem.layout : 'word';
    const isSingleCharToken = !(layout === 'sentence' || layout === 'long-sentence' || layout === 'dialogue');

    builderSelectedTokens.forEach((item, index) => {
        const btn = document.createElement('button');
        btn.className = 'tile-btn';
        btn.innerText = item.token === ' ' ? '␣' : item.token;
        btn.onclick = () => {
            if (!isSingleCharToken) {
                speak(item.token);
            }
            builderSelectedTokens.splice(index, 1);
            renderBuilderTiles();
        };
        answerZone.appendChild(btn);
    });

    builderTokensPool.forEach((item) => {
        const btn = document.createElement('button');
        btn.className = 'tile-btn';
        btn.innerText = item.token === ' ' ? '␣' : item.token;

        const isSelected = builderSelectedTokens.some(s => s.id === item.id);
        if (isSelected) {
            btn.classList.add('disabled');
        } else {
            btn.onclick = () => {
                if (!isSingleCharToken) {
                    speak(item.token);
                }
                builderSelectedTokens.push(item);
                renderBuilderTiles();
            };
        }
        poolZone.appendChild(btn);
    });
}

function clearBuilderSelection() {
    builderSelectedTokens = [];
    renderBuilderTiles();
}

function checkBuilderAnswer() {
    if (isAnimating) return;

    const answerZone = document.getElementById('builder-answer-zone');
    const hint = document.getElementById('correct-hint');
    const currentItem = builderItemsAll[builderIndex];
    const layout = currentItem.layout;

    const isSentenceMode = (layout === 'sentence' || layout === 'long-sentence' || layout === 'dialogue');

    const userAnswer = builderSelectedTokens.map(t => t.token).join(isSentenceMode ? ' ' : '');
    const correctAnswer = currentItem.german.trim();

    if (userAnswer === correctAnswer) {
        isAnimating = true;
        if (hint) hint.classList.remove('show');
        answerZone.classList.add('success');
        speak(correctAnswer, () => {
            setTimeout(() => {
                builderIndex++;
                isAnimating = false;
                renderBuilderQuestion();
            }, 500);
        });
    } else {
        builderErrorCount++;
        isAnimating = true;
        answerZone.classList.add('error');

        if (builderErrorCount >= 3 && hint) {
            hint.classList.add('show');
        }

        setTimeout(() => {
            answerZone.classList.remove('error');
            isAnimating = false;
        }, 500);
    }
}

// ==========================================
// 🖼️ 听音选图练习模式（只取当前分组图片）
// ==========================================
function toggleImageMode() {
    if (isAutoplayRunning) stopAutoplay();
    if (isPracticeModeActive) quitPracticeMode();
    if (isBuilderModeActive) quitBuilderMode();

    const btn = document.getElementById('imageBtn');
    if (isImageModeActive) {
        quitImageMode();
    } else {
        isImageModeActive = true;
        btn.innerHTML = "❌ 退出";
        btn.classList.add('active');
        initImageGame();
    }
}

function quitImageMode() {
    isImageModeActive = false;
    isAnimating = false;
    const btn = document.getElementById('imageBtn');
    btn.innerHTML = "🖼️ 选图";
    btn.classList.remove('active');

    clearImageView();
    switchPage(currentActivePageId);
}

function clearImageView() {
    const existBox = document.getElementById('image-box');
    if (existBox) existBox.remove();
}

function initImageGame() {
    clearImageView();

    let rawList = [];
    if (currentActivePageId === 'review') {
        starredItems.forEach(x => {
            const isDialogue = x.layout === 'dialogue';
            const img = isDialogue ? x.data[3] : x.data[2];
            if (img) {
                rawList.push({ german: x.data[0], translation: x.data[1], imgUrl: img });
            }
        });
    } else {
        const page = appData[currentActivePageId];
        const isDialogue = page.layout === 'dialogue';
        page.items.forEach(item => {
            const img = isDialogue ? item[3] : item[2];
            if (img) {
                rawList.push({ german: item[0], translation: item[1], imgUrl: img });
            }
        });
    }

    if (rawList.length < 2) {
        alert("当前分组带有图片的卡片不足 2 张，无法生成选图测验哦！请切换到图片较多的分组。");
        quitImageMode();
        return;
    }

    imageModeItemsAll = rawList.sort(() => Math.random() - 0.5);
    imageModeIndex = 0;

    document.querySelectorAll('.page').forEach(p => {
        p.style.setProperty('display', 'none', 'important');
        p.classList.remove('show');
    });

    renderImageQuestion();
}

function navigateImageQuestion(step) {
    if (isAnimating) return;
    const newIndex = imageModeIndex + step;
    if (newIndex >= 0 && newIndex < imageModeItemsAll.length) {
        imageModeIndex = newIndex;
        renderImageQuestion();
    }
}

function renderImageQuestion() {
    clearImageView();

    if (imageModeIndex >= imageModeItemsAll.length) {
        alert("🎉 恭喜！你已完成本组听音选图测试！");
        quitImageMode();
        return;
    }

    const currentCorrect = imageModeItemsAll[imageModeIndex];

    // 🎯 仅从当前分组（imageModeItemsAll）中过滤出干扰选项，不再跨分组抽图
    let localDistractorsPool = imageModeItemsAll.filter(item => item.german !== currentCorrect.german);
    localDistractorsPool = localDistractorsPool.sort(() => Math.random() - 0.5);

    // 最多取 3 个干扰项（如果当前分组图片较少，取实际可用的最大数量）
    let distractors = localDistractorsPool.slice(0, 3);
    let options = [currentCorrect, ...distractors].sort(() => Math.random() - 0.5);

    const imageBox = document.createElement('div');
    imageBox.id = 'image-box';
    imageBox.className = 'practice-container';

    imageBox.innerHTML = `
        <div class="practice-header">
            <h3>👂 听音选图 (${imageModeIndex + 1}/${imageModeItemsAll.length})</h3>
            <div class="page-controls">
                <button class="nav-arrow" ${imageModeIndex === 0 ? 'disabled' : ''} onclick="navigateImageQuestion(-1)">◀</button>
                <button class="nav-arrow" ${imageModeIndex >= imageModeItemsAll.length - 1 ? 'disabled' : ''} onclick="navigateImageQuestion(1)">▶</button>
            </div>
        </div>
        <div class="builder-target-prompt">
            <span>请听发音并选择对应图片</span>
            <button class="speaker-btn" title="播放读音" onclick="speakImageTarget()">🔊</button>
        </div>
        <div class="image-grid" id="image-grid"></div>
    `;

    const pagesContainer = document.getElementById('pagesContainer');
    pagesContainer.appendChild(imageBox);

    const grid = document.getElementById('image-grid');

    options.forEach(opt => {
        const card = document.createElement('div');
        card.className = 'image-choice-card';
        card.innerHTML = `<img src="${opt.imgUrl}" alt="choice">`;
        card.onclick = () => { if(!isAnimating) checkImageChoice(card, opt.german, currentCorrect.german); };
        grid.appendChild(card);
    });

    setTimeout(() => {
        speakImageTarget();
    }, 300);
}

function speakImageTarget() {
    if (imageModeItemsAll[imageModeIndex]) {
        speak(imageModeItemsAll[imageModeIndex].german);
    }
}

function checkImageChoice(cardElement, chosenGerman, correctGerman) {
    if (chosenGerman === correctGerman) {
        isAnimating = true;
        cardElement.classList.add('success');
        setTimeout(() => {
            imageModeIndex++;
            isAnimating = false;
            renderImageQuestion();
        }, 600);
    } else {
        isAnimating = true;
        cardElement.classList.add('error');
        setTimeout(() => {
            cardElement.classList.remove('error');
            isAnimating = false;
        }, 500);
    }
}

// ==========================================
// 初始化 DOM 渲染引擎与页面切换逻辑
// ==========================================
const tabsContainer = document.getElementById('tabsContainer');
const pagesContainer = document.getElementById('pagesContainer');

const reviewBtn = document.createElement('button');
reviewBtn.id = 'btn-review'; reviewBtn.innerHTML = "⭐ 重点"; reviewBtn.className = "active";
reviewBtn.onclick = () => switchPage('review');
tabsContainer.appendChild(reviewBtn);

const reviewPageDiv = document.createElement('div');
reviewPageDiv.id = 'page-review'; reviewPageDiv.className = 'page show';
const reviewGridDiv = document.createElement('div');
reviewGridDiv.id = 'review-grid';
reviewPageDiv.appendChild(reviewGridDiv);
pagesContainer.appendChild(reviewPageDiv);

Object.keys(appData).forEach((key) => {
    const pageConfig = appData[key];
    const btn = document.createElement('button');
    btn.id = `btn-${key}`; btn.innerHTML = pageConfig.title;
    btn.onclick = () => switchPage(key);
    tabsContainer.appendChild(btn);

    const pageDiv = document.createElement('div');
    pageDiv.id = `page-${key}`; pageDiv.className = 'page';
    
    const gridDiv = document.createElement('div');
    const layoutStyle = pageConfig.layout || 'word';
    gridDiv.className = `grid-${layoutStyle}`;

    pageConfig.items.forEach((item, itemIndex) => {
        if (layoutStyle === 'dialogue') {
            const direction = item[2] || 'left'; 
            const imgUrl = item[3] || '';
            const imgHtml = imgUrl ? `<img src="${imgUrl}" class="card-img" alt="illustration">` : '';
            const avatarTxt = direction === 'left' ? '😼' : '🐶';
            
            const row = document.createElement('div');
            row.className = `dialogue-row ${direction}`;
            row.innerHTML = `
                <div class="dialogue-content">
                    <div class="chat-avatar">${avatarTxt}</div>
                    <div class="card">
                        <span class="star-icon star-${key}-${itemIndex}" onclick="toggleStar(event, '${key}', ${itemIndex}, this)">★</span>
                        ${imgHtml}
                        <div class='big'>${item[0]}</div>
                        <div class='small'>${item[1]}</div>
                    </div>
                </div>
            `;
            const textToSpeak = pageConfig.speakType === 'key' ? item[0] : item[1];
            row.querySelector('.card').onclick = () => {
                stopAutoplay();
                speak(textToSpeak);
            };
            gridDiv.appendChild(row);
        } else {
            const imgUrl = item[2] || '';
            const imgHtml = imgUrl ? `<img src="${imgUrl}" class="card-img" alt="illustration">` : '';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="star-icon star-${key}-${itemIndex}" onclick="toggleStar(event, '${key}', ${itemIndex}, this)">★</span>
                ${imgHtml}
                <div class='big'>${item[0]}</div>
                <div class='small'>${item[1]}</div>
            `;
            const textToSpeak = pageConfig.speakType === 'key' ? item[0] : item[1];
            card.onclick = () => {
                stopAutoplay();
                speak(textToSpeak);
            };
            gridDiv.appendChild(card);
        }
    });
    pageDiv.appendChild(gridDiv);
    pagesContainer.appendChild(pageDiv);
});

renderReviewPage();
syncStarUIFromStorage();

function switchPage(pageId) {
    stopAutoplay();
    currentActivePageId = pageId;

    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    const targetBtn = document.getElementById(`btn-${pageId}`);
    if (targetBtn) targetBtn.classList.add('active');

    document.querySelectorAll('.page').forEach(p => {
        p.style.removeProperty('display'); 
        p.classList.remove('show');
    });

    if (isPracticeModeActive) {
        document.querySelectorAll('.page').forEach(p => {
            p.style.setProperty('display', 'none', 'important');
        });
        initPracticeGame();
    } else if (isBuilderModeActive) {
        document.querySelectorAll('.page').forEach(p => {
            p.style.setProperty('display', 'none', 'important');
        });
        initBuilderGame();
    } else if (isImageModeActive) {
        document.querySelectorAll('.page').forEach(p => {
            p.style.setProperty('display', 'none', 'important');
        });
        initImageGame();
    } else {
        const targetPage = document.getElementById(`page-${pageId}`);
        if (targetPage) targetPage.classList.add('show');
    }
}
</script>
